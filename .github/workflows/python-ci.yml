name: Docker CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{pmerugu}}
          password: ${{MeraIndia@1992}}

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ci-cd-poc:latest .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ci-cd-poc:latest